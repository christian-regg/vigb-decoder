name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: '' }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: '.exe' }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --target ${{ matrix.target }} --bin vigb-max2pdf
      - name: rename binary
        shell: bash
        run: |
          src=target/${{ matrix.target }}/release/vigb-max2pdf${{ matrix.ext }}
          dst=vigb-max2pdf-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.ext }}
          cp "$src" "$dst"
          echo "ASSET=$dst" >> $GITHUB_ENV
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true

  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
